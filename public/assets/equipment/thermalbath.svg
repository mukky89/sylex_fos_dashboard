<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 380" fill="none" role="img" aria-label="Termostatický kúpeľ / teplotný kalibrátor s ventilátorom">
  <defs>
    <linearGradient id="tb-body" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef1f6"/><stop offset="1" stop-color="#d6dbe6"/>
    </linearGradient>
    <linearGradient id="tb-block" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#b8c0cf"/><stop offset="1" stop-color="#8b93a6"/>
    </linearGradient>
    <radialGradient id="tb-fan" cx="0.5" cy="0.45" r="0.62">
      <stop offset="0" stop-color="#3a4152"/><stop offset="0.7" stop-color="#242a37"/><stop offset="1" stop-color="#151a24"/>
    </radialGradient>
    <radialGradient id="tb-heat" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ff6a3d" stop-opacity="0.55"/><stop offset="1" stop-color="#ff6a3d" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- telo prístroja -->
  <rect x="34" y="70" width="232" height="286" rx="14" fill="url(#tb-body)" stroke="#c2c8d4" stroke-width="2"/>

  <!-- horný blok / kúpeľ s vrtmi na sondy -->
  <rect x="70" y="30" width="160" height="60" rx="10" fill="url(#tb-block)" stroke="#767e91" stroke-width="2"/>
  <!-- stúpajúce teplo nad blokom -->
  <ellipse cx="150" cy="34" rx="70" ry="22" fill="url(#tb-heat)"/>
  <!-- vrty na vloženie sond -->
  <g fill="#3a3f47">
    <ellipse cx="112" cy="52" rx="8" ry="5"/>
    <ellipse cx="150" cy="52" rx="8" ry="5"/>
    <ellipse cx="188" cy="52" rx="8" ry="5"/>
  </g>
  <g fill="#5a6172"><rect x="108" y="20" width="8" height="30" rx="3"/><rect x="146" y="16" width="8" height="34" rx="3"/><rect x="184" y="22" width="8" height="28" rx="3"/></g>

  <!-- SYLEX červený akcentový pruh + značka -->
  <rect x="50" y="84" width="200" height="6" rx="3" fill="#E2001A"/>
  <rect x="52" y="98" width="86" height="15" rx="3" fill="#1f2937" opacity="0.9"/>
  <text x="62" y="110" font-family="Arial" font-size="11" font-weight="700" fill="#fff">SIKA · TP37</text>

  <!-- digitálny displej -->
  <rect x="52" y="124" width="196" height="60" rx="8" fill="#0b1220" stroke="#2b3346" stroke-width="2"/>
  <text x="66" y="150" font-family="Arial" font-size="10" font-weight="700" fill="#67e8f9" letter-spacing="1">REF °C</text>
  <text x="150" y="172" font-family="Arial,Helvetica,sans-serif" font-size="30" font-weight="800" fill="#ff4d4d" text-anchor="middle">85.0</text>
  <circle cx="236" cy="136" r="4" fill="#4ade80"><animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/></circle>

  <!-- ventilátor (rotujúci) -->
  <circle cx="150" cy="256" r="58" fill="url(#tb-fan)" stroke="#0f131b" stroke-width="3"/>
  <g stroke="#39414f" stroke-width="2" opacity="0.7" fill="none">
    <circle cx="150" cy="256" r="46"/><circle cx="150" cy="256" r="30"/>
  </g>
  <g fill="#aeb7c7">
    <animateTransform attributeName="transform" attributeType="XML" type="rotate"
      from="0 150 256" to="360 150 256" dur="1.6s" repeatCount="indefinite"/>
    <path d="M150 256 L192 230 A50 50 0 0 1 199 268 Z"/>
    <path d="M150 256 L174 302 A50 50 0 0 1 138 305 Z"/>
    <path d="M150 256 L104 284 A50 50 0 0 1 99 244 Z"/>
    <path d="M150 256 L134 210 A50 50 0 0 1 172 214 Z"/>
  </g>
  <circle cx="150" cy="256" r="11" fill="#0f131b"/>
  <circle cx="150" cy="256" r="5" fill="#5a6172"/>

  <!-- ovládacie tlačidlá vpravo -->
  <g fill="#c2c8d4" stroke="#9aa2b1" stroke-width="1.5">
    <circle cx="228" cy="226" r="10"/><circle cx="228" cy="256" r="10"/><circle cx="228" cy="286" r="10"/>
  </g>

  <!-- vetracie lamely dole -->
  <g fill="#c2c8d4"><rect x="60" y="326" width="180" height="6" rx="3"/><rect x="60" y="338" width="180" height="6" rx="3"/></g>

  <!-- nožičky -->
  <rect x="48" y="356" width="16" height="14" rx="3" fill="#6b7280"/>
  <rect x="236" y="356" width="16" height="14" rx="3" fill="#6b7280"/>

  <!-- sieťový (ethernet) konektor vzadu -->
  <rect x="256" y="150" width="14" height="20" rx="2" fill="#2b2f36"/>
  <rect x="259" y="154" width="8" height="9" rx="1" fill="#67e8f9"/>
</svg>
