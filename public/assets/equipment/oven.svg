<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" fill="none">
  <defs>
    <linearGradient id="ov-body" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#eef1f5"/>
    </linearGradient>
  </defs>
  <!-- telo -->
  <rect x="20" y="20" width="260" height="248" rx="12" fill="url(#ov-body)" stroke="#d4dae2" stroke-width="2"/>
  <!-- horný panel -->
  <rect x="110" y="44" width="96" height="92" rx="10" fill="#3b5b9a"/>
  <text x="124" y="70" font-family="Arial" font-size="15" font-weight="800" fill="#e11d48">Thermo</text>
  <text x="126" y="82" font-family="Arial" font-size="7" letter-spacing="2" fill="#fff">SCIENTIFIC</text>
  <rect x="122" y="88" width="72" height="34" rx="3" fill="#0b1220"/>
  <!-- tlačidlá -->
  <g fill="#5b7fc0">
    <rect x="120" y="126" width="22" height="9" rx="3"/>
    <rect x="147" y="126" width="22" height="9" rx="3"/>
    <rect x="174" y="126" width="22" height="9" rx="3"/>
  </g>
  <!-- ľavá rukoväť -->
  <rect x="44" y="120" width="16" height="70" rx="7" fill="#4f74b8"/>
