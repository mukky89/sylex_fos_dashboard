  <rect x="224" y="46" width="44" height="56" rx="5" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="230" y="54" width="32" height="26" rx="3" fill="#dfe9ee"/>
  <text x="235" y="66" font-family="Arial" font-size="9" font-weight="700" fill="#0f172a">37.0</text>
