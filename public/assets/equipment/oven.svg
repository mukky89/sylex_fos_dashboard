  <g fill="#3b82f6"><circle cx="234" cy="90" r="3"/><circle cx="246" cy="90" r="3"/><circle cx="258" cy="90" r="3"/></g>
  <!-- ventilačná mriežka -->
  <g stroke="#1f2937" stroke-width="2"><line x1="244" y1="30" x2="262" y2="30"/><line x1="244" y1="35" x2="262" y2="35"/></g>
  <!-- nožičky -->
  <rect x="34" y="268" width="16" height="14" rx="3" fill="#6b7280"/>
